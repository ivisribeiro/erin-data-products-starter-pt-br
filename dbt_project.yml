name: '{tenant}_data_products'
version: '0.1.0'
config-version: 2

profile: '{tenant}_default'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  {tenant}_data_products:
    +materialized: view
    bronze:
      +materialized: ephemeral
    silver:
      +materialized: table
      +tags: ["silver"]
    gold:
      +materialized: table
      +tags: ["gold", "data_product"]

vars:
  bronze_database: bronze
  silver_database: silver
  gold_database: gold
